# ------------------------------------------------------------------
# myTTS — Docker Compose
#
# Start everything:
#   docker compose up -d
#
# First download the model:
#   mkdir -p pretrained_models
#   python -c "from huggingface_hub import snapshot_download; snapshot_download('FunAudioLLM/Fun-CosyVoice3-0.5B-2512', local_dir='pretrained_models/Fun-CosyVoice3-0.5B')"
# ------------------------------------------------------------------

version: "3.9"

services:
  tts-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: mytts-backend
    container_name: mytts-backend
    ports:
      - "8000:8000"
    volumes:
      - ./pretrained_models:/app/pretrained_models:ro
      - ./storage:/app/storage
    environment:
      - MODEL_DIR=/app/pretrained_models/Fun-CosyVoice3-0.5B
      - STORAGE_DIR=/app/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  streamlit-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: mytts-frontend
    container_name: mytts-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://tts-backend:8000
    depends_on:
      tts-backend:
        condition: service_healthy
    restart: unless-stopped
